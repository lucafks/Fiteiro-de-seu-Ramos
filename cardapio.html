<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Tábua Rústica - Seu Ramos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/cardapio.css">
</head>

<body class="fundo-oled">

    <nav class="bottom-nav">
        <div class="nav-carousel" id="nav-carousel">

            <p>>></p>
            <a href="#caldinhos">Caldinhos</a>
            <a href="#espetinhos">Espetinhos</a>
            <a href="#petiscos">Petiscos</a>
            <a href="#bolinhos">Bolinhos</a>
            <a href="#pasteis">Pasteis</a>
            <a href="#refrigerantes">Refri/Outros</a>
            <a href="#cervejas600">Cervejas</a>
            <a href="#cachacas">Cachaças</a>
            <a href="#drinks">Drinks</a>
            <a href="#vinhos">Vinhos</a>
            <a href="#ices">Ice</a>
            <p><< </p>
        </div>
        <button class="nav-handle" id="handle-drawer">
            <span>▲</span>
            <small>OFERTAS</small>
        </button>
    </nav>

    <div class="drawer-overlay" id="drawer">
        <div class="drawer-content">
            <button class="close-drawer" id="close-drawer">X</button>
            <h3>PROMOÇÕES DO DIA</h3>

            <div class="cards-grid">
                <a href="" class="promo-card">
                    <img src="midia/cards/imagess.jpg" alt="Promoção 2">
                    <div class="promo-info">
                        <span>Combo Petisco + Breja</span>
                    </div>
                </a>
                <a href="" class="promo-card p1">
                    <img src="midia/cards/Sem título.jpg" alt="Promoção 1">
                    <div class="promo-info">
                        <span>Dobradinha de Chopp</span>
                    </div>
                </a>
                <a href="" class="promo-card p2">
                    <img src="midia/cards/images.jpg" alt="Promoção 2">
                    <div class="promo-info">
                        <span>Combo Petisco + Breja</span>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <main class="moldura-tabua">
        <a href="index.html" class="btn-voltar">
            <i class="fas fa-chevron-left"></i> <span>HOME</span>
        </a>

        <button id="theme-toggle" class="theme-btn" aria-label="Trocar Tema">
            <span class="icon">🌙</span>
        </button>

        <div class="furo-tabua"></div>

        <header class="header-entalhado">
            <img class="texto-entalhado" src="midia/cardramos.png" alt="FITEIRO DE SEU RAMOS">
            <div class="divisor-queimado"></div>
            <h1 class="texto-entalhado">CARDÁPIO</h1>
        </header>

        <!-- As seções serão geradas automaticamente pelo JavaScript -->

        <footer class="footer-tabua">
            <p>#FITEIRODESEURAMOS</p>
        </footer>
    </main>
<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<!-- Seu cardápio -->
<script src="cardapio.js"></script>

</html>
